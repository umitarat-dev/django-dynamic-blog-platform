{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="row justify-content-center my-5">
    <div class="col-md-6">
        <div class="card shadow-sm border-0 p-4 bg-light">
            <form action="" method="POST">
                {% csrf_token %}
                <fieldset class="form-group">
                    <legend class="border-bottom pb-2 mb-4 font-weight-bold text-dark">Sign In to Blog</legend>
                    
                    {{ form|crispy }}
                </fieldset>
                
                <div class="form-group d-flex justify-content-between align-items-center mt-4">
                    <button class="btn btn-info px-4" type="submit">Login</button>
                    <a href="{% url 'password_reset' %}" class="text-muted small font-weight-bold">Forgot Password?</a>
                </div>
            </form>
            
            <div class="border-top pt-3 mt-3 text-center">
                <small class="text-muted">
                    Need an account? <a href="{% url 'register' %}" class="font-weight-bold ml-1 text-info">Sign Up Now</a>
                </small>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
